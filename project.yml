name: beanBud
options:
  bundleIdPrefix: com.beanbud
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    INFOPLIST_FILE: beanBud/Resources/Info.plist
    DEVELOPMENT_TEAM: ""  # Fill in your Apple ID team in Xcode after generation

targets:
  beanBud:
    type: application
    platform: iOS
    sources:
      - path: beanBud
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beanbud.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: beanBud/Resources/Info.plist
    preBuildScripts:
      - name: "SwiftLint"
        script: |
          if which swiftlint > /dev/null; then
            swiftlint
          fi
        basedOnDependencyAnalysis: false
        inputFiles: []
        outputFiles: []
